server {
    listen 8099;
    server_name _;

    location / {
        proxy_pass http://127.0.0.1:50051;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Accept-Encoding "";

        sub_filter_once off;
        sub_filter_types text/css text/javascript application/javascript application/json;

        sub_filter '="/_expo/' '="./_expo/';
        sub_filter '="/api/' '="./api/';
        sub_filter '="/assets/' '="./assets/';
        sub_filter '="/fonts/' '="./fonts/';
        sub_filter '="/favicon.ico"' '="./favicon.ico"';
        sub_filter "='/_expo/" "='./_expo/";
        sub_filter "='/api/" "='./api/";
        sub_filter "='/assets/" "='./assets/";
        sub_filter "='/fonts/" "='./fonts/";
        sub_filter '"/_expo/' '"./_expo/';
        sub_filter '"/api/' '"./api/';
        sub_filter '"/assets/' '"./assets/';
        sub_filter '"/fonts/' '"./fonts/';
        sub_filter '`/_expo/' '`./_expo/';
        sub_filter '`/api/' '`./api/';
        sub_filter '`/assets/' '`./assets/';
        sub_filter '`/fonts/' '`./fonts/';
        sub_filter '/_expo/static/' './_expo/static/';
        sub_filter '/assets/' './assets/';
        sub_filter '/fonts/' './fonts/';
        sub_filter 'url(/_expo/' 'url(./_expo/';
        sub_filter 'url(/assets/' 'url(./assets/';
        sub_filter 'url(/fonts/' 'url(./fonts/';
        sub_filter 'pathname:n.pathname,search:n.search,hash:n.hash' 'pathname:"/",search:"",hash:n.hash';
        sub_filter 'window.location?.origin?window.location.origin:"http://localhost:50051"' 'window.location?.href?(window.location.href.endsWith("/")?window.location.href.slice(0,-1):window.location.href):"http://localhost:50051"';
    }
}
